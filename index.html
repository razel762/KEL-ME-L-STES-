<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Hunt - English Learning</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .word-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 400px; }
        .word-card { background: #222; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid #333; }
        
        /* Video ve Resim Paneli */
        #page-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000; 
        }
        .container { width: 90%; max-width: 500px; text-align: center; }
        .video-box { 
            width: 100%; aspect-ratio: 16/9; background: #333; 
            border-radius: 20px; overflow: hidden; margin-top: 20px; 
            display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>KELİMELER</h2>
    <div class="word-grid" id="wordGrid"></div>

    <div id="page-overlay">
        <span class="close-btn" onclick="closePage()">&times;</span>
        <div class="container">
            <h1 id="topWord">WORD</h1>
            <p id="topTr">(anlamı)</p>
            <div class="video-box" id="filmKutusu">
                </div>
        </div>
    </div>

    <script>
        // Senin yüklediğin dosya isimlerine göre güncel liste
        const wordData = [
            {en:"show", tr:"göstermek", vid:"VID-20260314-WA0001.mp4"},
            {en:"leave", tr:"ayrılmak", vid:"VID-20260314-WA0000.mp4"},
            {en:"talk", tr:"konuşmak", vid:"VID-20260313-WA0139.mp4"},
            {en:"call", tr:"aramak", vid:"VID-20260313-WA0138.mp4"},
            {en:"sometimes", tr:"bazen", vid:"VID-20260313-WA0033.mp4"},
            {en:"different", tr:"farklı", vid:"VID-20260313-WA0034.mp4"},
            {en:"especially", tr:"özellikle", vid:"VID-20260313-WA0035.mp4"},
            {en:"other", tr:"diğer", vid:"VID-20260313-WA0024.mp4"}
        ];

        const grid = document.getElementById('wordGrid');

        // Kartları Oluştur
        wordData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `<h3>${item.en}</h3><p>${item.tr}</p>`;
            card.onclick = () => openPage(item);
            grid.appendChild(card);
        });

        function openPage(item) {
            document.getElementById('topWord').innerText = item.en.toUpperCase();
            document.getElementById('topTr').innerText = `(${item.tr})`;
            
            // Video yolunu ayarla (videolar klasörünün içinde)
            const videoPath = "videolar/" + item.vid;
            
            document.getElementById('filmKutusu').innerHTML = `
                <video autoplay muted loop playsinline>
                    <source src="${videoPath}" type="video/mp4">
                    Tarayıcınız videoyu desteklemiyor.
                </video>
            `;
            
            document.getElementById('page-overlay').style.display = 'flex';
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
            document.getElementById('filmKutusu').innerHTML = ''; // Videoyu durdurmak için temizle
        }
    </script>
</body>
</html>
