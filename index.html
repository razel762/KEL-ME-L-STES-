<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce 100 Kelime</title>

<style>

body{
font-family:Segoe UI;
background:#f0f2f5;
margin:0;
padding:20px;
}

.list-container{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.word-item{
background:white;
padding:18px;
border-radius:15px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.word-text{
font-size:17px;
font-weight:600;
flex-grow:1;
}

.word-tr{
font-size:14px;
color:#888;
margin-left:8px;
}

.listen-icon{
font-size:20px;
color:#1DB954;
cursor:pointer;
}

#page-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#121212;
z-index:1000;
justify-content:center;
align-items:center;
flex-direction:column;
}

.content-container{
width:90%;
max-width:400px;
display:flex;
flex-direction:column;
gap:15px;
}

.word-header{
color:white;
text-align:center;
}

.word-header h1{
margin:0;
font-size:32px;
}

.media-row{
display:flex;
gap:10px;
}

.media-box{
flex:1;
height:160px;
background:#333;
border-radius:15px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.media-box img{
width:100%;
height:100%;
object-fit:cover;
}

.media-box video{
width:100%;
height:100%;
object-fit:cover;
}

.close-x{
position:absolute;
top:20px;
right:20px;
font-size:26px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1 style="text-align:center">İngilizce 100 Kelime</h1>

<div class="list-container" id="list"></div>

<div id="page-overlay">

<div class="close-x" onclick="closePage()">✕</div>

<div class="content-container">

<div class="word-header">
<h1 id="topWord"></h1>
<span id="topTr"></span>
</div>

<div class="media-row">
<div class="media-box" id="resimKutusu"></div>
<div class="media-box" id="filmKutusu"></div>
</div>

</div>
</div>

<script>

let currentWord="";

const wordData=[

{en:"show",tr:"göstermek",img:"",video:"VID-20260314-WA0001.mp4"},
{en:"leave",tr:"ayrılmak",img:"",video:"VID-20260314-WA0000.mp4"},
{en:"other",tr:"diğer",img:"",video:"VID-20260313-WA0024.mp4"},
{en:"talk",tr:"konuşmak",img:"https://i.ibb.co/275yVhc2/MG-20260310-WA0003.jpg",video:"VID-20260313-WA0139.mp4"},
{en:"call",tr:"aramak",img:"https://i.ibb.co/FkZWCBGw/MG-20260310-WA0013.jpg",video:"VID-20260313-WA0138.mp4"},
{en:"especially",tr:"özellikle",img:"",video:"VID-20260313-WA0035.mp4"},
{en:"different",tr:"farklı",img:"",video:"VID-20260313-WA0034.mp4"},
{en:"sometimes",tr:"bazen",img:"",video:"VID-20260313-WA0033.mp4"},
{en:"together",tr:"birlikte",img:"",video:"VID-20260313-WA0029.mp4"},
{en:"child",tr:"çocuk",img:"",video:"VID-20260313-WA0028.mp4"},
{en:"bad",tr:"kötü",img:"",video:"VID-20260313-WA0027.mp4"},
{en:"important",tr:"önemli",img:"",video:"VID-20260313-WA0026.mp4"},
{en:"really",tr:"gerçekten",img:"",video:"VID-20260313-WA0025.mp4"},
{en:"big",tr:"büyük",img:"",video:"VID-20260313-WA0023.mp4"},
{en:"always",tr:"her zaman",img:"",video:"VID-20260313-WA0022.mp4"},
{en:"finally",tr:"sonunda",img:"",video:"VID-20260313-WA0021.mp4"}

];

const listDiv=document.getElementById("list");

wordData.forEach((item,index)=>{

let div=document.createElement("div");

div.className="word-item";

div.innerHTML=`
<div class="word-text" onclick='openPage(${JSON.stringify(item)})'>
<b>${index+1}.</b> ${item.en} <span class="word-tr">${item.tr}</span>
</div>

<span class="listen-icon" onclick="event.stopPropagation(); speak('${item.en}')">🔊</span>
`;

listDiv.appendChild(div);

});

function openPage(item){

currentWord=item.en;

document.getElementById("topWord").innerText=item.en.toUpperCase();

document.getElementById("topTr").innerText="("+item.tr+")";

const imgUrl=item.img?item.img:"https://via.placeholder.com/150";

document.getElementById("resimKutusu").innerHTML=`<img src="${imgUrl}">`;

if(item.video){

document.getElementById("filmKutusu").innerHTML=
`<video controls>
<source src="${item.video}" type="video/mp4">
</video>`;

}else{

document.getElementById("filmKutusu").innerHTML=
`<p style="color:#aaa;font-size:12px">Video Yok</p>`;

}

document.getElementById("page-overlay").style.display="flex";

speak(item.en);

}

function closePage(){

document.getElementById("page-overlay").style.display="none";

window.speechSynthesis.cancel();

}

function speak(text){

window.speechSynthesis.cancel();

const u=new SpeechSynthesisUtterance(text);

u.lang="en-US";

window.speechSynthesis.speak(u);

}

</script>

</body>
</html>
