<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .list-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 5px; }
        .word-item { 
            background: white; padding: 15px; border: 1px solid #ddd; border-radius: 5px;
            cursor: pointer; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .word-item:hover { background: #e0f7fa; }
        .word-item::after { content: "›"; font-size: 24px; color: #aaa; }
        .speaker-btn {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            margin-right: 15px;
            cursor: pointer;
            font-size: 14px;
            line-height: 30px;
            text-align: center;
            display: inline-block;
        }
        .speaker-btn:hover { background: #2980b9; }
        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; overflow-y: auto;
        }
        .page-content { padding: 40px; text-align: center; }
        .back-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: left; }
        .image-placeholder { width: 100%; max-width: 400px; height: 300px; background: #eee; margin: 20px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .play-btn { background: #27ae60; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; width: 100%; max-width: 300px; }
        .tr-word { color: #7f8c8d; font-size: 14px; margin-left: 10px; font-style: italic; }
    </style>
</head>
<body>

    <h1>İngilizce Kelime Listesi</h1>
    <div class="list-container" id="list"></div>

    <div id="page-overlay">
        <div class="page-content">
            <button class="back-btn" onclick="closePage()">⬅ BACK</button>
            <h1 id="selectedWord" style="margin-top: 60px; text-transform: capitalize;">Kelime</h1>
            <div class="image-placeholder" id="imageBox"></div>
            <button class="play-btn" onclick="playSound()">▶ PLAY</button>
        </div>
    </div>

    <script>
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        const wordData = [
            {en:"time", tr:"zaman"}, {en:"year", tr:"yıl"}, {en:"people", tr:"insanlar"}, {en:"way", tr:"yol/yöntem"}, {en:"day", tr:"gün"}, 
            {en:"man", tr:"adam"}, {en:"thing", tr:"şey"}, {en:"woman", tr:"kadın"}, {en:"life", tr:"hayat"}, {en:"child", tr:"çocuk"}, 
            {en:"world", tr:"dünya"}, {en:"school", tr:"okul"}, {en:"state", tr:"durum/eyalet"}, {en:"family", tr:"aile"}, {en:"student", tr:"öğrenci"}, 
            {en:"group", tr:"grup"}, {en:"country", tr:"ülke"}, {en:"problem", tr:"sorun"}, {en:"hand", tr:"el"}, {en:"part", tr:"parça"}, 
            {en:"place", tr:"yer"}, {en:"case", tr:"durum/vaka"}, {en:"week", tr:"hafta"}, {en:"company", tr:"şirket"}, {en:"system", tr:"sistem"}, 
            {en:"word", tr:"kelime"}, {en:"work", tr:"iş/çalışmak"}, {en:"use", tr:"kullanmak"}, {en:"make", tr:"yapmak"}, {en:"take", tr:"almak"}, 
            {en:"give", tr:"vermek"}, {en:"come", tr:"gelmek"}, {en:"look", tr:"bakmak"}, {en:"want", tr:"istemek"}, {en:"find", tr:"bulmak"}, 
            {en:"tell", tr:"anlatmak"}, {en:"ask", tr:"sormak"}, {en:"try", tr:"denemek"}, {en:"need", tr:"ihtiyaç duymak"}, {en:"feel", tr:"hissetmek"}, 
            {en:"become", tr:"olmak"}, {en:"leave", tr:"ayrılmak"}, {en:"call", tr:"aramak/çağırmak"}, {en:"keep", tr:"tutmak/saklamak"}, {en:"start", tr:"başlamak"}, 
            {en:"seem", tr:"görünmek"}, {en:"help", tr:"yardım etmek"}, {en:"talk", tr:"konuşmak"}, {en:"turn", tr:"dönmek"}, {en:"begin", tr:"başlamak"}, 
            {en:"show", tr:"göstermek"}, {en:"good", tr:"iyi"}, {en:"new", tr:"yeni"}, {en:"first", tr:"birinci"}, {en:"last", tr:"son/geçen"}, 
            {en:"long", tr:"uzun"}, {en:"great", tr:"harika"}, {en:"little", tr:"küçük/az"}, {en:"own", tr:"kendi"}, {en:"other", tr:"diğer"}, 
            {en:"old", tr:"eski/yaşlı"}, {en:"right", tr:"doğru/sağ"}, {en:"big", tr:"büyük"}, {en:"high", tr:"yüksek"}, {en:"different", tr:"farklı"}, 
            {en:"small", tr:"küçük"}, {en:"large", tr:"geniş/büyük"}, {en:"next", tr:"sonraki"}, {en:"early", tr:"erken"}, {en:"young", tr:"genç"}, 
            {en:"important", tr:"önemli"}, {en:"few", tr:"birkaç"}, {en:"public", tr:"halka açık/kamu"}, {en:"bad", tr:"kötü"}, {en:"same", tr:"aynı"}, 
            {en:"able", tr:"yapabilen"}, {en:"very", tr:"çok"}, {en:"often", tr:"sık sık"}, {en:"really", tr:"gerçekten"}, {en:"quickly", tr:"hızlıca"}, 
            {en:"slowly", tr:"yavaşça"}, {en:"well", tr:"iyi"}, {en:"always", tr:"her zaman"}, {en:"sometimes", tr:"bazen"}, {en:"usually", tr:"genellikle"}, 
            {en:"together", tr:"birlikte"}, {en:"already", tr:"zaten/çoktan"}, {en:"almost", tr:"neredeyse"}, {en:"especially", tr:"özellikle"}, {en:"probably", tr:"muhtemelen"}, 
            {en:"finally", tr:"sonunda"}, {en:"easily", tr:"kolayca"}, {en:"recently", tr:"son zamanlarda"}, {en:"immediately", tr:"hemen"}, {en:"nearly", tr:"neredeyse"}, 
            {en:"currently", tr:"şu anda"}, {en:"clearly", tr:"açıkça"}, {en:"simply", tr:"basitçe"}, {en:"exactly", tr:"kesinlikle"}, {en:"strongly", tr:"güçlü bir şekilde"}
        ];

        const listDiv = document.getElementById('list');
        
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span><button class="speaker-btn" onclick="event.stopPropagation(); speak('${item.en}')">🔊</button>${index + 1}. ${item.en} <span class="tr-word">(${item.tr})</span></span>`;
            div.onclick = () => openPage(item.en);
            listDiv.appendChild(div);
        });

        function openPage(word) {
            document.getElementById('selectedWord').innerText = word;
            document.getElementById('page-overlay').style.display = 'block';
            speak(word);
            document.getElementById('imageBox').innerHTML = `<img src="https://source.unsplash.com/400x300/?${word}" style="width:100%; border-radius:10px;" alt="${word}">`;
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
        }
        
        function playSound() {
            alert("Şarkı çalma fonksiyonu aktif.");
        }
    </script>
</body>
</html>
