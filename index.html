<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Projesi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .list-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 5px; }
        .word-item { 
            background: white; padding: 15px; border: 1px solid #ddd; border-radius: 5px;
            cursor: pointer; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .word-item:hover { background: #e0f7fa; }
        .word-item::after { content: "›"; font-size: 24px; color: #aaa; }
        .speaker-btn {
            background: #3498db; color: white; border: none; border-radius: 50%;
            width: 30px; height: 30px; margin-right: 15px; cursor: pointer;
            font-size: 14px; line-height: 30px; text-align: center; display: inline-block;
        }
        .speaker-btn:hover { background: #2980b9; }
        #page-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; overflow-y: auto;
        }
        .page-content { padding: 40px; text-align: center; }
        .back-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: left; }
        .image-placeholder { 
            width: 100%; max-width: 400px; height: 300px; background: #eee; 
            margin: 20px auto; border-radius: 10px; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        .play-btn { background: #27ae60; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; width: 100%; max-width: 300px; }
        .tr-word { color: #7f8c8d; font-size: 14px; margin-left: 10px; font-style: italic; }
    </style>
</head>

            <div class="image-placeholder" id="imageBox"></div>

        const listDiv = document.getElementById('list');
        
        wordData.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<span><button class="speaker-btn" onclick="event.stopPropagation(); speak('${item.en}')">🔊</button>${index + 1}. ${item.en} <span class="tr-word">(${item.tr})</span></span>`;
            div.onclick = () => openPage(item);
            listDiv.appendChild(div);
        });

        function openPage(item) {
            document.getElementById('selectedWord').innerText = item.en;
            document.getElementById('page-overlay').style.display = 'block';
            speak(item.en);
            
            const imageBox = document.getElementById('imageBox');
            if(item.img && item.img !== "") {
                imageBox.innerHTML = `<img src="${item.img}" style="width:100%; height:100%; object-fit:contain; border-radius:10px;" alt="${item.en}">`;
            } else {
                imageBox.innerHTML = `<img src="https://source.unsplash.com/400x300/?${item.en}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;" alt="${item.en}">`;
            }
        }

        function closePage() {
            document.getElementById('page-overlay').style.display = 'none';
        }
